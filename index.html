<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SpeedGuard Real-Time</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0c10">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10; --surface: #111318; --border: #1e2230;
            --text: #e8eaf0; --muted: #4a5068;
            --ok: #00e676; --danger: #ff1744; --accent: #00e5ff;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background:var(--bg); color:var(--text);
            font-family:'DM Sans',sans-serif; height: 100dvh;
            display:flex; flex-direction:column; align-items:center;
            overflow:hidden; padding: 15px;
        }
        .app { 
            width:100%; max-width:400px; height: 100%; 
            display: flex; flex-direction: column; 
            justify-content: space-between; text-align: center; 
        }
        .logo { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:4px; color:var(--accent); opacity: 0.8; margin-bottom: 5px; }
        .status-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px; margin-bottom: 10px; font-size: 10px; display: flex; justify-content: space-between; color: var(--muted); }
        .status-item span { color: var(--text); font-weight: bold; }

        .ring-box { position:relative; width:210px; height:210px; margin: 0 auto 10px; }
        .ring-svg { width:100%; height:100%; transform:rotate(-90deg); }
        .ring-track { fill:none; stroke:var(--border); stroke-width:8; }
        .ring-arc { 
            fill:none; stroke:var(--ok); stroke-width:12; stroke-linecap:round; 
            stroke-dasharray:628; stroke-dashoffset:628; transition: stroke-dashoffset 0.6s ease-out, stroke 0.3s;
        }
        .ring-inner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .spd-num { font-family:'Bebas Neue',sans-serif; font-size:90px; line-height:0.9; color:var(--text); }
        .spd-unit { font-size:12px; font-weight:700; color:var(--muted); letter-spacing:3px; }

        .alert-box { 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 15px; padding: 12px; margin-bottom: 10px; 
            transition: 0.3s; min-height: 70px; display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .alert-box.danger { border-color: var(--danger); background: rgba(255,23,68,0.15); animation: pulse-danger 1s infinite; }
        @keyframes pulse-danger { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .limit-display { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .sign {
            width: 80px; height: 100px;
            background: #fff;
            border: 3px solid #000;
            border-radius: 6px;
            outline: 6px solid #fff;
            box-shadow: 0 0 0 8px #000, 0 6px 20px rgba(0,0,0,0.7);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 6px 4px 8px;
            gap: 0;
        }
        .sign-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 9px; font-weight: 900;
            color: #000; letter-spacing: 0.5px;
            text-align: center; line-height: 1.15;
            text-transform: uppercase;
        }
        .sign-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 46px; color: #000; line-height: 1;
            margin-top: 2px;
        }

        .btn-main {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: 3px;
            background: var(--accent); color: #000; cursor: pointer; 
            margin-top: auto; box-shadow: 0 5px 15px rgba(0,229,255,0.3);
        }
        .btn-main.stop { background: var(--surface); color: var(--danger); border: 1px solid var(--danger); }
    </style>
</head>
<body>

    <div class="app">
        <div class="logo">SPEEDGUARD PRO</div>

        <div class="status-bar">
            <div class="status-item">GPS: <span id="gpsAcc">Buscando...</span></div>
            <div class="status-item" style="display:flex; align-items:center; gap:8px;">
                <span id="unitStatus" style="min-width:36px; text-align:right;">KM/H</span>
                <div onclick="toggleUnit()" style="
                    width:46px; height:24px; border-radius:12px; background:var(--border);
                    position:relative; cursor:pointer; transition:background .3s; flex-shrink:0;
                " id="unitSwitch">
                    <div id="unitThumb" style="
                        position:absolute; top:3px; left:3px;
                        width:18px; height:18px; border-radius:50%;
                        background:var(--accent); transition:left .3s;
                    "></div>
                </div>
                <span style="min-width:28px;">MPH</span>
            </div>
        </div>

        <div class="ring-box">
            <svg class="ring-svg" viewBox="0 0 210 210">
                <circle class="ring-track" cx="105" cy="105" r="100"/>
                <circle id="arc" class="ring-arc" cx="105" cy="105" r="100"/>
            </svg>
            <div class="ring-inner">
                <div class="spd-num" id="spdNum">0</div>
                <div class="spd-unit" id="unitLabel">KM/H</div>
            </div>
        </div>

        <div class="alert-box" id="alertBox">
            <span id="alertIcon" style="font-size: 24px;">📡</span>
            <div style="text-align: left;">
                <div id="alertT" style="font-weight: bold; font-size: 14px;">ESPERANDO SEÑAL</div>
                <div id="alertS" style="font-size: 11px; color: var(--muted);">Presiona iniciar para detectar vía</div>
            </div>
        </div>

        <div class="limit-display">
            <div class="sign">
                <div class="sign-label">SPEED<br>LIMIT</div>
                <div class="sign-num" id="signNum">--</div>
            </div>
            <div style="text-align: left;">
                <div id="limitLabel" style="font-size: 9px; color: var(--muted); font-weight: bold;">LÍMITE VÍA</div>
                <div id="diffVal" style="font-family: 'Bebas Neue'; font-size: 24px; color:var(--muted)">DETECTANDO...</div>
            </div>
        </div>

        <button class="btn-main" id="btnMain" onclick="toggleSystem()">INICIAR RASTREO</button>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }

        let running = false, limit = null, watchId = null, wakeLock = null;
        let audioCtx = null, alertInterval = null, curSeverity = 'none', lastCoords = null;
        let unit = 'kmh'; // Por defecto KMH
        let voiceTimer = null, lastSpokenSpeed = null, voicePending = false;

        const arc = document.getElementById('arc'), CIRCUM = 2 * Math.PI * 100;
        arc.style.strokeDasharray = CIRCUM;

        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        // Fallback por tipo de vía cuando no hay maxspeed en OpenStreetMap
        const ROAD_DEFAULTS_KMH = {
            motorway: 110, motorway_link: 80,
            trunk: 90,     trunk_link: 70,
            primary: 80,   primary_link: 60,
            secondary: 60, secondary_link: 50,
            tertiary: 50,  tertiary_link: 40,
            residential: 30, living_street: 20,
            service: 20,   unclassified: 50, road: 50
        };

        function applyLimit(kmhVal) {
            limit = kmhVal;
            const displayVal = (unit === 'mph') ? Math.round(kmhVal * 0.621371) : kmhVal;
            document.getElementById('signNum').textContent = displayVal;
        }

        async function updateLocationData(lat, lon) {
            // Solo saltar si ya tenemos coords recientes Y ya tenemos límite detectado
            if (lastCoords && limit && Math.hypot(lat - lastCoords.lat, lon - lastCoords.lon) < 0.0003) return;

            try {
                // Detectar país para ajustar unidades
                const revRes = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`,
                    { headers: { 'User-Agent': 'SpeedGuardPro/1.0' } }
                );
                const revData = await revRes.json();
                const countryCode = revData.address.country_code;
                const imperialCountries = ['us', 'gb', 'lr', 'mm'];
                unit = imperialCountries.includes(countryCode) ? 'mph' : 'kmh';
                document.getElementById('unitStatus').textContent = unit.toUpperCase();
                document.getElementById('unitLabel').textContent = unit.toUpperCase();
            } catch(e) { console.warn("Nominatim falló, manteniendo unidad actual"); }

            try {
                // Consultar Overpass con radio más amplio (50m) para mejor detección
                const query = `[out:json][timeout:10];way(around:50,${lat},${lon})[highway];out tags;`;
                const response = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.elements.length > 0) {
                    const tags = data.elements[0].tags;

                    if (tags.maxspeed) {
                        // Tiene maxspeed explícito
                        let raw = tags.maxspeed;
                        let kmh;
                        if (/mph/i.test(raw)) {
                            kmh = Math.round(parseFloat(raw) * 1.60934);
                        } else {
                            const m = raw.match(/\d+/);
                            kmh = m ? parseInt(m[0]) : null;
                        }
                        if (kmh) { applyLimit(kmh); lastCoords = {lat, lon}; return; }
                    }

                    // No tiene maxspeed — usar fallback por tipo de vía
                    const hw = tags.highway;
                    const fallback = ROAD_DEFAULTS_KMH[hw];
                    if (fallback) {
                        applyLimit(fallback);
                        document.getElementById('signNum').textContent =
                            (unit === 'mph') ? Math.round(fallback * 0.621371) + '*' : fallback + '*';
                    }
                }
                lastCoords = {lat, lon};
            } catch(e) {
                console.error("Overpass error:", e);
                lastCoords = null; // Reintentar en próximo movimiento
            }
        }

        function manageAlertSound(severity) {
            if (curSeverity === severity) return;
            curSeverity = severity;
            clearInterval(alertInterval);
            if (severity === 'none') return;
            let freq, rate, type;
            if (severity === 'low') { freq = 440; rate = 1000; type = 'sine'; }
            else if (severity === 'med') { freq = 800; rate = 450; type = 'square'; }
            else { freq = 1200; rate = 180; type = 'sawtooth'; }
            alertInterval = setInterval(() => {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.value = freq; o.type = type;
                g.gain.setValueAtTime(0.4, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
                o.start(); o.stop(audioCtx.currentTime + 0.2);
            }, rate);
        }

        function speakAlert(currentVal, limitVal, isCritical) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); // Cancelar cualquier voz activa

            const unitWord = (unit === 'mph') ? 'millas por hora' : 'kilómetros por hora';
            let msg;
            if (isCritical) {
                msg = `Te recuerdo que vas a ${currentVal} ${unitWord}, sobre el límite de velocidad que es ${limitVal}. Puedes ganarte una multa por exceso de velocidad.`;
            } else {
                msg = `Solo te aviso que vas a ${currentVal} ${unitWord}, sobre el límite de velocidad que es ${limitVal}.`;
            }

            const utter = new SpeechSynthesisUtterance(msg);
            utter.lang = (unit === 'mph') ? 'en-US' : 'es-MX';
            utter.rate = 1.0;
            utter.volume = 1.0;

            // Pausar sonido continuo mientras habla, reanudarlo al terminar
            utter.onstart = () => { clearInterval(alertInterval); };
            utter.onend   = () => {
                voicePending = false;
                // Reactivar sonido continuo después del mensaje
                const sev = curSeverity;
                curSeverity = 'none'; // forzar re-trigger
                manageAlertSound(sev);
            };

            voicePending = true;
            window.speechSynthesis.speak(utter);
        }

        function scheduleVoice(currentVal, limitVal, isCritical) {
            // Si ya hay un timer corriendo para la misma velocidad, no reiniciar
            if (voiceTimer && lastSpokenSpeed === currentVal) return;
            clearTimeout(voiceTimer);
            lastSpokenSpeed = currentVal;
            // Primera vez: hablar de inmediato
            if (!voicePending) speakAlert(currentVal, limitVal, isCritical);
            // Luego cada 2 minutos mientras siga en exceso
            voiceTimer = setInterval(() => {
                if (!voicePending) speakAlert(currentVal, limitVal, isCritical);
            }, 120000); // 2 minutos
        }

        function stopVoice() {
            clearInterval(voiceTimer);
            voiceTimer = null;
            lastSpokenSpeed = null;
            voicePending = false;
            if (window.speechSynthesis) window.speechSynthesis.cancel();
        }

        function updateUI(speedMs) {
            // Conversión según unidad detectada
            let speed = (unit === 'mph') ? speedMs * 2.23694 : speedMs * 3.6;
            const currentVal = Math.round(speed);
            
            document.getElementById('spdNum').textContent = currentVal;
            arc.style.strokeDashoffset = CIRCUM - (Math.min(currentVal, 140) / 140) * CIRCUM;

            if (!limit) return;

            // Límite en la misma unidad de display
            const limitDisplay = (unit === 'mph') ? Math.round(limit * 0.621371) : limit;
            const diff = currentVal - limitDisplay;
            const diffEl = document.getElementById('diffVal'), box = document.getElementById('alertBox');

            if (diff > 5) {
                // CRÍTICO: más de 5 unidades sobre el límite
                diffEl.textContent = `+${diff} EXCESO`; diffEl.style.color = 'var(--danger)';
                box.classList.add('danger');
                document.getElementById('alertT').textContent = "REDUCE VELOCIDAD";
                document.getElementById('alertIcon').textContent = "⚠️";
                let sev = diff > 15 ? 'high' : (diff > 5 ? 'med' : 'low');
                manageAlertSound(sev); arc.style.stroke = 'var(--danger)';
                scheduleVoice(currentVal, limitDisplay, true);

            } else if (diff > 0) {
                // TOLERANCIA: 1-5 unidades sobre el límite — aviso de voz cada 2 min, sin sonido continuo
                diffEl.textContent = `+${diff} AVISO`; diffEl.style.color = 'var(--danger)';
                box.classList.add('danger');
                document.getElementById('alertT').textContent = "VELOCIDAD LÍMITE";
                document.getElementById('alertIcon').textContent = "⚠️";
                manageAlertSound('none'); arc.style.stroke = 'var(--danger)';
                scheduleVoice(currentVal, limitDisplay, false);

            } else {
                // LEGAL
                diffEl.textContent = "VELOCIDAD LEGAL"; diffEl.style.color = 'var(--ok)';
                box.classList.remove('danger');
                document.getElementById('alertT').textContent = "CONDUCCIÓN SEGURA";
                document.getElementById('alertIcon').textContent = "✅";
                manageAlertSound('none'); arc.style.stroke = 'var(--ok)';
                stopVoice();
            }
        }

        function toggleUnit() {
            unit = (unit === 'kmh') ? 'mph' : 'kmh';
            document.getElementById('unitStatus').textContent = unit.toUpperCase();
            document.getElementById('unitLabel').textContent = unit.toUpperCase();
            // Move thumb
            document.getElementById('unitThumb').style.left = (unit === 'mph') ? '25px' : '3px';
            document.getElementById('unitSwitch').style.background = (unit === 'mph') ? 'var(--accent)' : 'var(--border)';
        }

        async function toggleSystem() {
            initAudio();
            running = !running;
            const btn = document.getElementById('btnMain');
            if (running) {
                try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
                try { if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch(e){}
                btn.textContent = "DETENER RASTREO"; btn.classList.add('stop');
                watchId = navigator.geolocation.watchPosition((pos) => {
                    document.getElementById('gpsAcc').textContent = Math.round(pos.coords.accuracy) + "m";
                    if (document.getElementById('alertT').textContent === 'ESPERANDO SEÑAL') {
                        document.getElementById('alertT').textContent = 'GPS ACTIVO';
                        document.getElementById('alertS').textContent = 'Detectando límite de velocidad...';
                        document.getElementById('alertIcon').textContent = '📡';
                    }
                    updateUI(pos.coords.speed || 0);
                    updateLocationData(pos.coords.latitude, pos.coords.longitude);
                }, (err) => console.error(err), { enableHighAccuracy: true });
            } else {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                if (wakeLock) wakeLock.release();
                try { if (document.exitFullscreen && document.fullscreenElement) document.exitFullscreen(); } catch(e){}
                manageAlertSound('none');
                stopVoice();
                btn.textContent = "INICIAR RASTREO"; btn.classList.remove('stop');
                document.getElementById('spdNum').textContent = "0";
                document.getElementById('signNum').textContent = "--";
                document.getElementById('diffVal').textContent = "DETECTANDO...";
                arc.style.strokeDashoffset = CIRCUM;
            }
        }
    </script>
</body>
</html>
