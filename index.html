<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LightningGuard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #12121f;
    --border: #1e1e35;
    --accent: #f0c040;
    --danger: #ff3c3c;
    --warn: #ff8c00;
    --safe: #00e676;
    --text: #d0d0e0;
    --mono: 'Share Tech Mono', monospace;
    --head: 'Barlow Condensed', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--head);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0 8px;
    border-bottom: 1px solid var(--border);
  }

  .logo { display: flex; align-items: center; gap: 10px; }

  .bolt-icon {
    font-size: 28px;
    animation: pulse-icon 2s ease-in-out infinite;
  }

  @keyframes pulse-icon {
    0%,100% { filter: drop-shadow(0 0 6px var(--accent)); }
    50%      { filter: drop-shadow(0 0 16px var(--accent)); }
  }

  .logo-text { font-size: 22px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: #fff; }
  .logo-text span { color: var(--accent); }

  .refresh-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 12px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: #555;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .refresh-btn:active { color: var(--accent); border-color: var(--accent); }
  .refresh-btn.spinning { color: var(--accent); border-color: var(--accent); animation: rot 1s linear infinite; }
  @keyframes rot { to { transform: rotate(360deg); } }

  .status-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.5s;
  }
  .status-panel::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--sc);
    transition: background 0.5s;
  }

  .status-indicator {
    width: 56px; height: 56px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; flex-shrink: 0;
    border: 2px solid var(--sc);
    box-shadow: 0 0 20px var(--sc);
    transition: all 0.5s;
  }

  .status-info { flex: 1; }
  .status-label { font-family: var(--mono); font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .status-text { font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; transition: color 0.5s; line-height: 1; margin-top: 2px; }
  .status-sub { font-size: 12px; font-family: var(--mono); color: #555; margin-top: 4px; }

  .radar-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px;
  }
  .radar-label { font-family: var(--mono); font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  #radarCanvas { width: 100%; border-radius: 2px; display: block; }

  .data-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .data-card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 12px; }
  .data-card-label { font-family: var(--mono); font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .data-card-val { font-family: var(--mono); font-size: 20px; color: var(--accent); }
  .data-card-unit { font-size: 11px; color: #555; margin-left: 3px; }

  .config-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 14px; }
  .config-title { font-family: var(--mono); font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
  .radius-control { display: flex; align-items: center; gap: 12px; }
  .radius-control input[type=range] { flex: 1; -webkit-appearance: none; height: 3px; background: var(--border); border-radius: 2px; outline: none; }
  .radius-control input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 8px var(--accent); }
  .radius-val { font-family: var(--mono); font-size: 18px; color: var(--accent); min-width: 60px; text-align: right; }

  .log-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 12px; }
  .log-title { font-family: var(--mono); font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  .log-list { list-style: none; display: flex; flex-direction: column; gap: 4px; max-height: 160px; overflow-y: auto; }
  .log-list::-webkit-scrollbar { width: 3px; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); }
  .log-item { font-family: var(--mono); font-size: 11px; padding: 5px 8px; border-left: 2px solid; background: rgba(255,255,255,0.02); display: flex; align-items: baseline; gap: 8px; animation: log-in 0.3s ease; }
  @keyframes log-in { from { opacity: 0; transform: translateX(-8px); } }
  .log-item.danger { border-color: var(--danger); color: #ff8888; }
  .log-item.warn   { border-color: var(--warn); color: #ffb060; }
  .log-item.info   { border-color: #333; color: #555; }
  .log-item .log-time { color: #444; font-size: 10px; flex-shrink: 0; }

  .controls { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 12px; font-family: var(--head); font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; border: 1px solid; border-radius: 3px; cursor: pointer; background: transparent; transition: all 0.2s; }
  .btn-primary { color: var(--accent); border-color: var(--accent); }
  .btn-primary:active { background: rgba(240,192,64,0.1); }
  .btn-mute { color: #666; border-color: #333; }

  .flash-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 100; opacity: 0; }
  .flash-overlay.active { animation: flash-alert 0.8s ease-out; }
  @keyframes flash-alert { 0% { opacity: 0.7; background: rgba(255,60,60,0.35); } 100% { opacity: 0; } }

  .loc-bar { font-family: var(--mono); font-size: 10px; color: #333; text-align: center; padding: 4px 0; }
  .update-bar { font-family: var(--mono); font-size: 10px; color: #333; text-align: center; padding: 2px 0; }
</style>
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>

<div class="app">
  <header>
    <div class="logo">
      <span class="bolt-icon">⚡</span>
      <span class="logo-text">Lightning<span>Guard</span></span>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchWeather()">↻ ACTUALIZAR</button>
  </header>

  <div class="status-panel" id="statusPanel" style="--sc: var(--safe)">
    <div class="status-indicator" id="statusIcon">🟢</div>
    <div class="status-info">
      <div class="status-label">Estado de alerta</div>
      <div class="status-text" id="statusText" style="color: var(--safe)">CARGANDO</div>
      <div class="status-sub" id="statusSub">Obteniendo datos...</div>
    </div>
  </div>

  <div class="radar-wrap">
    <div class="radar-label">Radar · <span id="radarKm">10</span> km radio</div>
    <canvas id="radarCanvas" height="240"></canvas>
  </div>

  <div class="data-grid">
    <div class="data-card">
      <div class="data-card-label">Prob. tormenta</div>
      <div class="data-card-val" id="valThunder">—<span class="data-card-unit">%</span></div>
    </div>
    <div class="data-card">
      <div class="data-card-label">Prob. precipitación</div>
      <div class="data-card-val" id="valPrecip">—<span class="data-card-unit">%</span></div>
    </div>
    <div class="data-card">
      <div class="data-card-label">Visibilidad</div>
      <div class="data-card-val" id="valVis">—<span class="data-card-unit">km</span></div>
    </div>
    <div class="data-card">
      <div class="data-card-label">Viento</div>
      <div class="data-card-val" id="valWind">—<span class="data-card-unit">km/h</span></div>
    </div>
  </div>

  <div class="config-panel">
    <div class="config-title">Radio de alerta</div>
    <div class="radius-control">
      <input type="range" id="radiusSlider" min="5" max="100" value="10" step="5">
      <span class="radius-val"><span id="radiusDisplay">10</span> km</span>
    </div>
  </div>

  <div class="log-panel">
    <div class="log-title">Registro de eventos</div>
    <ul class="log-list" id="logList">
      <li class="log-item info"><span class="log-time">--:--</span> Iniciando sistema...</li>
    </ul>
  </div>

  <div class="controls">
    <button class="btn btn-primary" onclick="testAlert()">TEST ALERTA</button>
    <button class="btn btn-mute" id="btnMute" onclick="toggleMute()">🔇 SILENCIAR</button>
  </div>

  <div class="loc-bar" id="locBar">Obteniendo ubicación GPS...</div>
  <div class="update-bar" id="updateBar">—</div>
</div>

<script>
const API_KEY = 'nRB4piKi5I6UZYfqaYpwhFsWYFMtotH3';
let ALERT_RADIUS_KM = 10;
let muted = false;
let audioCtx = null;
let userLat = null;
let userLon = null;
let currentThunderPct = 0;

const canvas  = document.getElementById('radarCanvas');
const ctx2d   = canvas.getContext('2d');

// ── GEOLOCATION ──────────────────────────────────────────
function initLocation() {
  if (!navigator.geolocation) { addLog('GPS no disponible', 'warn'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    document.getElementById('locBar').textContent = `GPS: ${userLat.toFixed(4)}, ${userLon.toFixed(4)}`;
    addLog('Ubicación GPS obtenida', 'info');
    fetchWeather();
    setInterval(fetchWeather, 5 * 60 * 1000); // cada 5 min
  }, () => {
    addLog('GPS denegado — activa el permiso', 'danger');
    document.getElementById('locBar').textContent = 'GPS denegado';
  }, { enableHighAccuracy: true, timeout: 15000 });
}

// ── TOMORROW.IO ───────────────────────────────────────────
async function fetchWeather() {
  if (userLat === null) { addLog('Sin GPS aún', 'warn'); return; }
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  addLog('Consultando Tomorrow.io...', 'info');

  const fields = 'thunderstormProbability,precipitationProbability,windSpeed,visibility';
  const url = `https://api.tomorrow.io/v4/weather/realtime?location=${userLat},${userLon}&fields=${fields}&units=metric&apikey=${API_KEY}`;

  try {
    const res  = await fetch(url);
    const data = await res.json();

    if (!res.ok) {
      addLog(`API Error: ${data?.message || res.status}`, 'danger');
      btn.classList.remove('spinning');
      return;
    }

    const v = data.data.values;
    processData(v);
    document.getElementById('updateBar').textContent = `Actualizado: ${formatTime(Date.now())}`;
    addLog('Datos reales recibidos ✓', 'info');
  } catch(e) {
    addLog(`Error de red: ${e.message}`, 'danger');
  }
  btn.classList.remove('spinning');
}

function processData(v) {
  const thunder = v.thunderstormProbability   ?? 0;
  const precip  = v.precipitationProbability  ?? 0;
  const windMs  = v.windSpeed                 ?? 0;
  const vis     = v.visibility                ?? 0;
  const windKmh = (windMs * 3.6).toFixed(1);

  currentThunderPct = thunder;

  document.getElementById('valThunder').innerHTML = `${thunder.toFixed(0)}<span class="data-card-unit">%</span>`;
  document.getElementById('valPrecip').innerHTML  = `${precip.toFixed(0)}<span class="data-card-unit">%</span>`;
  document.getElementById('valVis').innerHTML     = `${vis.toFixed(1)}<span class="data-card-unit">km</span>`;
  document.getElementById('valWind').innerHTML    = `${windKmh}<span class="data-card-unit">km/h</span>`;

  updateStatus(thunder);

  if (thunder >= 30) triggerAlert(thunder);
}

// ── STATUS ────────────────────────────────────────────────
function updateStatus(thunder) {
  let icon, text, sub, color;
  if (thunder >= 60) {
    icon = '⚠️'; text = 'PELIGRO'; color = 'var(--danger)';
    sub = `Tormenta eléctrica probable — ${thunder.toFixed(0)}%`;
  } else if (thunder >= 25) {
    icon = '🟡'; text = 'PRECAUCIÓN'; color = 'var(--warn)';
    sub = `Actividad eléctrica posible — ${thunder.toFixed(0)}%`;
  } else {
    icon = '🟢'; text = 'SEGURO'; color = 'var(--safe)';
    sub = `Sin riesgo eléctrico detectado`;
  }
  const panel = document.getElementById('statusPanel');
  panel.style.setProperty('--sc', color);
  document.getElementById('statusIcon').textContent = icon;
  document.getElementById('statusIcon').style.borderColor = color;
  document.getElementById('statusIcon').style.boxShadow = `0 0 20px ${color}`;
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusText').style.color = color;
  document.getElementById('statusSub').textContent  = sub;
}

// ── RADAR ─────────────────────────────────────────────────
function resizeCanvas() {
  canvas.width  = canvas.parentElement.clientWidth - 24;
  canvas.height = 240;
}

function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function drawRadar() {
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const maxR = Math.min(W,H) * 0.44;
  const thunder = currentThunderPct;

  ctx2d.clearRect(0,0,W,H);
  ctx2d.fillStyle = '#080810';
  ctx2d.fillRect(0,0,W,H);

  // Rings
  [0.33,0.66,1].forEach(f => {
    ctx2d.beginPath();
    ctx2d.arc(cx,cy,maxR*f,0,Math.PI*2);
    ctx2d.strokeStyle = '#1a1a2e';
    ctx2d.lineWidth = 1;
    ctx2d.stroke();
    ctx2d.fillStyle = '#2a2a4a';
    ctx2d.font = '9px Share Tech Mono, monospace';
    ctx2d.fillText(`${(ALERT_RADIUS_KM*f).toFixed(0)}km`, cx+maxR*f+3, cy-3);
  });

  // Cross
  ctx2d.strokeStyle = '#1a1a2e'; ctx2d.lineWidth = 1;
  ctx2d.beginPath(); ctx2d.moveTo(cx,cy-maxR); ctx2d.lineTo(cx,cy+maxR); ctx2d.stroke();
  ctx2d.beginPath(); ctx2d.moveTo(cx-maxR,cy); ctx2d.lineTo(cx+maxR,cy); ctx2d.stroke();

  // Alert ring
  ctx2d.beginPath();
  ctx2d.arc(cx,cy,maxR,0,Math.PI*2);
  ctx2d.strokeStyle = thunder>=60 ? 'rgba(255,60,60,0.5)' : thunder>=25 ? 'rgba(255,140,0,0.4)' : 'rgba(0,230,118,0.2)';
  ctx2d.lineWidth = 1.5;
  ctx2d.setLineDash([4,4]);
  ctx2d.stroke();
  ctx2d.setLineDash([]);

  // Sweep
  const angle = ((Date.now()/3000)%1)*Math.PI*2;
  ctx2d.save();
  ctx2d.translate(cx,cy);
  ctx2d.rotate(angle);
  const sc = thunder>=60 ? 'rgba(255,60,60,0.3)' : thunder>=25 ? 'rgba(255,140,0,0.25)' : 'rgba(0,230,118,0.2)';
  const grad = ctx2d.createLinearGradient(0,0,maxR,0);
  grad.addColorStop(0, sc); grad.addColorStop(1,'transparent');
  ctx2d.beginPath(); ctx2d.moveTo(0,0); ctx2d.arc(0,0,maxR,-0.5,0.5); ctx2d.closePath();
  ctx2d.fillStyle = grad; ctx2d.fill();
  ctx2d.restore();

  // Activity blobs proportional to thunder %
  if (thunder > 0) {
    const count = Math.round(thunder / 10);
    const rng = mulberry32(Math.floor(Date.now()/8000));
    const c = thunder>=60 ? '255,60,60' : thunder>=25 ? '255,140,0' : '240,192,64';
    for (let i=0; i<count; i++) {
      const a  = rng()*Math.PI*2;
      const r  = rng()*maxR*0.9;
      const px = cx + r*Math.cos(a);
      const py = cy + r*Math.sin(a);
      const g  = ctx2d.createRadialGradient(px,py,0,px,py,14);
      g.addColorStop(0,`rgba(${c},0.4)`); g.addColorStop(1,'transparent');
      ctx2d.fillStyle = g;
      ctx2d.beginPath(); ctx2d.arc(px,py,14,0,Math.PI*2); ctx2d.fill();
      ctx2d.beginPath(); ctx2d.arc(px,py,3,0,Math.PI*2);
      ctx2d.fillStyle = `rgba(${c},0.9)`; ctx2d.fill();
    }
  }

  // User dot
  ctx2d.beginPath(); ctx2d.arc(cx,cy,6,0,Math.PI*2); ctx2d.fillStyle='#00e676'; ctx2d.fill();
  ctx2d.beginPath(); ctx2d.arc(cx,cy,3,0,Math.PI*2); ctx2d.fillStyle='#fff'; ctx2d.fill();

  // Compass
  ['N','E','S','O'].forEach((d,i) => {
    const a = i*Math.PI/2 - Math.PI/2;
    const r = maxR+14;
    ctx2d.fillStyle = d==='N' ? '#f0c040' : '#333';
    ctx2d.font = 'bold 11px Barlow Condensed, sans-serif';
    ctx2d.textAlign = 'center'; ctx2d.textBaseline = 'middle';
    ctx2d.fillText(d, cx+r*Math.cos(a), cy+r*Math.sin(a));
  });
  ctx2d.textAlign='left'; ctx2d.textBaseline='alphabetic';
}

function radarLoop() { drawRadar(); requestAnimationFrame(radarLoop); }
radarLoop();

// ── ALERT ─────────────────────────────────────────────────
let lastAlertTime = 0;

function triggerAlert(thunder) {
  const now = Date.now();
  if (now - lastAlertTime < 60000) return;
  lastAlertTime = now;

  const extreme = thunder >= 60;
  const label   = extreme ? 'PELIGRO' : 'PRECAUCIÓN';
  addLog(`⚡ ${label} — Tormenta ${thunder.toFixed(0)}%`, extreme ? 'danger' : 'warn');

  const f = document.getElementById('flashOverlay');
  f.className = ''; void f.offsetWidth; f.className = 'flash-overlay active';

  if (navigator.vibrate) navigator.vibrate([300,100,300,100,600]);
  if (!muted) playAlertSound(extreme);

  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(`⚡ LightningGuard — ${label}`, {
      body: `Probabilidad de tormenta eléctrica: ${thunder.toFixed(0)}%`,
      tag: 'lightning', requireInteraction: true
    });
  }
}

function testAlert() {
  getAudioCtx();
  lastAlertTime = 0;
  triggerAlert(85);
  addLog('— Test ejecutado —', 'warn');
}

// ── AUDIO ─────────────────────────────────────────────────
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playAlertSound(extreme=false) {
  try {
    const ac = getAudioCtx();
    const seq = extreme ? [880,440,880,440,880] : [660,440,660];
    let t = ac.currentTime;
    seq.forEach(freq => {
      const osc=ac.createOscillator(), gain=ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type='square'; osc.frequency.setValueAtTime(freq,t);
      gain.gain.setValueAtTime(0.3,t);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.22);
      osc.start(t); osc.stop(t+0.22); t+=0.25;
    });
  } catch(e){}
}

function toggleMute() {
  muted = !muted;
  document.getElementById('btnMute').textContent = muted ? '🔊 ACTIVAR' : '🔇 SILENCIAR';
  addLog(muted ? 'Audio silenciado' : 'Audio activado', 'info');
}

// ── LOG ───────────────────────────────────────────────────
function addLog(msg, type='info') {
  const li = document.createElement('li');
  li.className = `log-item ${type}`;
  li.innerHTML = `<span class="log-time">${formatTime(Date.now())}</span> ${msg}`;
  const list = document.getElementById('logList');
  list.insertBefore(li, list.firstChild);
  if (list.children.length > 60) list.removeChild(list.lastChild);
}

function formatTime(ts) {
  return new Date(ts).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── RADIUS ────────────────────────────────────────────────
document.getElementById('radiusSlider').addEventListener('input', function() {
  ALERT_RADIUS_KM = parseInt(this.value);
  document.getElementById('radiusDisplay').textContent = ALERT_RADIUS_KM;
  document.getElementById('radarKm').textContent = ALERT_RADIUS_KM;
});

// ── RESIZE ────────────────────────────────────────────────
window.addEventListener('resize', () => { resizeCanvas(); });
resizeCanvas();

// ── INIT ──────────────────────────────────────────────────
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
initLocation();
addLog('LightningGuard v2.0 — datos reales Tomorrow.io', 'info');
</script>
</body>
</html>
